name: Sync Podcast Episodes

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install script dependencies
        working-directory: scripts/sync_podcast
        run: npm ci

      - name: Create sync branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "chore/sync-podcast-$(date +%Y%m%d)"

      - name: Run podcast sync script
        working-directory: scripts/sync_podcast
        run: node sync.js

      - name: Commit, push and open PR
        run: |
          git add content/fec/
          if git diff --cached --quiet; then
            echo "No new episodes to commit."
            exit 0
          fi
          git commit -m "chore: sync new podcast episodes from RSS feed"
          git push origin HEAD
          gh pr create \
            --title "chore: sync new podcast episodes" \
            --body "Automated sync of new podcast episodes from RSS feed." \
            --base main \
            --reviewer copilot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
