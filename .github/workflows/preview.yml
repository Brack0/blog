name: Deploy PR previews

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency: preview-${{ github.ref }}

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zola
        if: github.event.action != 'closed'
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.18.0

      - name: Build site
        if: github.event.action != 'closed'
        shell: bash
        run: |
          set -euo pipefail
          zola build --base-url "/pr-preview/pr-${{ github.event.pull_request.number }}"

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./public
          preview-branch: gh-pages
          qr-code: true
