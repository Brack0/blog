name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - 'content/**'
      - 'templates/**'
      - 'sass/**'
      - 'static/**'
      - 'config.toml'
      - 'highlight_themes/**'
      - '.github/workflows/preview.yml'
  workflow_dispatch:

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build PR preview
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request' && !github.event.pull_request.draft &&
       (github.base_ref == 'main' || contains(github.event.pull_request.labels.*.name, 'deploy-preview'))) ||
      github.event_name == 'workflow_dispatch'
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              const branch = context.ref.replace('refs/heads/', '');
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${branch}`,
                state: 'open',
              });
              if (prs.length === 0) {
                core.setFailed(`No open PR found for branch: ${branch}`);
                return;
              }
              core.setOutput('number', prs[0].number);
            } else {
              core.setOutput('number', context.payload.pull_request.number);
            }

      - name: Install Zola v0.18.0
        run: |
          set -euo pipefail
          curl -sL https://github.com/getzola/zola/releases/download/v0.18.0/zola-v0.18.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo install -m 0755 zola /usr/local/bin/zola

      - name: Build site (preview)
        run: |
          zola build --base-url "/blog/pr-preview/pr-${{ steps.pr.outputs.number }}"

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-${{ steps.pr.outputs.number }}
          path: public/

  deploy:
    name: Deploy PR preview
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download preview artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-preview-${{ needs.build.outputs.pr_number }}
          path: /tmp/preview-site

      - name: Deploy to gh-pages branch
        run: |
          set -euo pipefail
          PR_NUMBER=${{ needs.build.outputs.pr_number }}
          DEST="pr-preview/pr-${PR_NUMBER}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . --quiet
          fi

          rm -rf "${DEST}"
          mkdir -p "${DEST}"
          cp -r /tmp/preview-site/. "${DEST}/"

          git add "${DEST}"
          git diff --staged --quiet || \
            git commit -m "Deploy preview for PR #${PR_NUMBER} [skip ci]"
          git push origin gh-pages || \
            (git pull --rebase origin gh-pages && git push origin gh-pages)

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ needs.build.outputs.pr_number }};
            let previewUrl;
            try {
              const { data: pagesInfo } = await github.rest.repos.getPages({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              const base = pagesInfo.html_url.endsWith('/')
                ? pagesInfo.html_url
                : pagesInfo.html_url + '/';
              previewUrl = `${base}pr-preview/pr-${prNumber}/`;
            } catch (err) {
              core.warning(`Could not fetch GitHub Pages info: ${err.message}. Falling back to github.io URL.`);
              const owner = context.repo.owner.toLowerCase();
              const repo = context.repo.repo.toLowerCase();
              previewUrl = `https://${owner}.github.io/${repo}/pr-preview/pr-${prNumber}/`;
            }

            const marker = '<!-- pr-preview-comment -->';
            const body = `${marker}\n🚀 **Preview deployment ready!**\n\nYour changes are available at: ${previewUrl}\n\n*Last updated: ${new Date().toUTCString()}*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
