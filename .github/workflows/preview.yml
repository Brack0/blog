name: Deploy PR previews

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
      - ready_for_review

concurrency: preview-${{ github.ref }}

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        if: github.event.action != 'closed'
        uses: ./.github/actions/build-site
        with:
          zola-version: '0.18.0'
          base-url: "/${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.pull_request.number }}"

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./public
          preview-branch: gh-pages
          qr-code: true
