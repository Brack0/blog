name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - 'content/**'
      - 'templates/**'
      - 'sass/**'
      - 'static/**'
      - 'config.toml'
      - 'highlight_themes/**'
      - '.github/workflows/preview.yml'
  workflow_dispatch:

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build PR preview
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request' && !github.event.pull_request.draft &&
       (github.base_ref == 'main' || contains(github.event.pull_request.labels.*.name, 'deploy-preview'))) ||
      github.event_name == 'workflow_dispatch'
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              const branch = context.ref.replace('refs/heads/', '');
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${branch}`,
                state: 'open',
              });
              if (prs.length === 0) {
                core.setFailed(`No open PR found for branch: ${branch}`);
                return;
              }
              core.setOutput('number', prs[0].number);
            } else {
              core.setOutput('number', context.payload.pull_request.number);
            }

      - name: Install Zola and build site
        uses: ./.github/actions/build-site
        with:
          zola-version: '0.18.0'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: pr-preview-${{ steps.pr.outputs.number }}
          path: public/

  deploy:
    name: Deploy PR preview
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
      pull-requests: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: pr-preview-${{ needs.build.outputs.pr_number }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ needs.build.outputs.pr_number }};
            const previewUrl = '${{ steps.deployment.outputs.page_url }}';
            const marker = '<!-- pr-preview-comment -->';
            const body = `${marker}\n🚀 **Preview deployment ready!**\n\nYour changes are available at: ${previewUrl}\n\n*Last updated: ${new Date().toUTCString()}*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
