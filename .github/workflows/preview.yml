name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - 'content/**'
      - 'templates/**'
      - 'sass/**'
      - 'static/**'
      - 'config.toml'
      - 'highlight_themes/**'
      - '.github/workflows/preview.yml'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to deploy a preview for'
        required: true
        type: number

jobs:
  preview:
    name: Build and deploy PR preview
    runs-on: ubuntu-latest
    if: >
      github.base_ref == 'main' ||
      contains(github.event.pull_request.labels.*.name, 'deploy-preview') ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve PR number and preview URL
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "base_path=/blog/pr-preview/pr-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "url=https://brack0.dev/blog/pr-preview/pr-${PR_NUMBER}/" >> "$GITHUB_OUTPUT"

      - name: Install Zola v0.18.0
        run: |
          set -euo pipefail
          curl -sL https://github.com/getzola/zola/releases/download/v0.18.0/zola-v0.18.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo install -m 0755 zola /usr/local/bin/zola

      - name: Build site (preview)
        run: |
          zola build --base-url "${{ steps.pr.outputs.base_path }}"

      - name: Deploy preview to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          destination_dir: pr-preview/pr-${{ steps.pr.outputs.number }}
          keep_files: true

      - name: Comment preview URL on PR
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.number }};
            const previewUrl = '${{ steps.pr.outputs.url }}';
            const marker = '<!-- pr-preview-comment -->';
            const body = `${marker}\n🚀 **Preview deployment ready!**\n\nYour changes are available at: ${previewUrl}\n\n*Last updated: ${new Date().toUTCString()}*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
